pihole:
  replicaCount: 1

  image:
    repository: pihole/pihole
    tag: "2026.04.1"

  admin:
    password: "changeme"

  persistentVolumeClaim:
    enabled: true
    size: 2Gi
    storageClass: "microk8s-hostpath"

  serviceDns:
    type: LoadBalancer
    port: 53
    loadBalancerIP: "192.168.0.200"
    annotations:
      metallb.universe.tf/allow-shared-ip: "pihole"

  serviceWeb:
    type: LoadBalancer
    http:
      enabled: true
      port: 80
    https:
      enabled: true
      port: 443
    loadBalancerIP: "192.168.0.200"
    annotations:
      metallb.universe.tf/allow-shared-ip: "pihole"

  serviceDhcp:
    enabled: false

  extraEnvVars:
    TZ: "America/New_York"
    DNS1: "1.1.1.1"
    DNS2: "8.8.8.8"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  nodeSelector:
    kubernetes.io/hostname: node6