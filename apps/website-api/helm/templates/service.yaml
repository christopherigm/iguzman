apiVersion: v1
kind: Service
metadata:
  name: {{ include "website-api.fullname" . }}
  labels:
    {{- include "website-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
    {{- if .Values.nginx.enabled }}
    - port: {{ .Values.nginx.servicePort }}
      targetPort: {{ .Values.nginx.port }}
      protocol: TCP
      name: nginx
    {{- end }}
  selector:
    {{- include "website-api.selectorLabels" . | nindent 4 }}
