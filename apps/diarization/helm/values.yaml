# ─────────────────────────────────────────────────────────────────────────────
# Diarization Microservice - Helm Values
# ─────────────────────────────────────────────────────────────────────────────

# -- Number of old ReplicaSets to keep for rollbacks
revisionHistoryLimit: 2

# -- Keep at 1: model objects are held in-process memory
replicaCount: 1

# ─── Container image ──────────────────────────────────────────────────────────
image:
  repository: christopherguzman/diarization
  tag: 'latest'
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ─── Name overrides ───────────────────────────────────────────────────────────
nameOverride: ''
fullnameOverride: ''

# ─── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: 'nginx'
  annotations:
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
    # Allow audio file uploads up to 100 MB
    nginx.ingress.kubernetes.io/proxy-body-size: '100m'
    # Diarization + transcription of long audio can take several minutes on CPU
    nginx.ingress.kubernetes.io/proxy-read-timeout: '600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '600'
  hosts:
    - host: diarization.iguzman.com.mx
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: diarization-tls
      hosts:
        - diarization.iguzman.com.mx

# ─── Environment variables ────────────────────────────────────────────────────
env:
  PORT: '8000'
  LOG_LEVEL: 'info'
  WHISPER_MODEL_SIZE: 'medium'
  # Injected dynamically in deployment.yaml using the release fullname.
  # Override here only if you point to an external MongoDB instance.
  MONGODB_URL: ''

# Sensitive values - reference existing Kubernetes Secrets.
# Create the secret first (see README), then these are injected at runtime.
envFromSecret:
  - name: API_KEY
    secretName: diarization-secrets
    secretKey: API_KEY
  # HF_TOKEN is only needed when modelsBaked is false (models are downloaded at startup).
  # When modelsBaked is true this entry is ignored and the secret key is not required.
  - name: HF_TOKEN
    secretName: diarization-secrets
    secretKey: HF_TOKEN
    onlyWhenNotBaked: true

# ─── Model baking ─────────────────────────────────────────────────────────────
# Set to true when the Docker image was built with baked-in models (multi-stage
# Dockerfile with HF_TOKEN build arg). When true:
#   - HF_TOKEN is not injected at runtime (secret key not required)
#   - startupProbe window shrinks from 15 min to 2 min (no download needed)
modelsBaked: false

# ─── Health probes ────────────────────────────────────────────────────────────
# modelsBaked true  → models load from image cache; allow 2 min (12 × 10 s).
# modelsBaked false → pyannote + whisper downloaded on first boot (5-10 min);
#                     allow 15 min (90 × 10 s).
probes:
  startupProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    # failureThreshold is computed from modelsBaked in deployment.yaml (12 or 90)

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 0
    periodSeconds: 15
    failureThreshold: 3

# ─── Node affinity ────────────────────────────────────────────────────────────
nodeAffinity:
  enabled: true
  nodeNames:
    - node6

# ─── Resources ────────────────────────────────────────────────────────────────
# pyannote + faster-whisper on CPU is memory- and CPU-intensive.
# The i9 on node6 can handle concurrent diarization; adjust limits as needed.
resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 4000m
    memory: 8Gi

# ─── MongoDB (job store) ─────────────────────────────────────────────────────
# Standalone MongoDB deployment in the same namespace. Shared across all
# diarization replicas. Jobs are TTL-expired after 1 hour via a MongoDB index.
mongodb:
  image: mongo:7
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 1Gi
    storageClass: ''   # leave empty to use the cluster default StorageClass

# ─── Model cache (PersistentVolume) ──────────────────────────────────────────
# When enabled, HuggingFace model files are stored on a PVC so they survive
# pod restarts and avoid re-downloading on every deployment.
# Recommended for production; requires a StorageClass that supports ReadWriteOnce.
modelCache:
  enabled: true
  size: 5Gi
  storageClass: ''   # leave empty to use the cluster default StorageClass
