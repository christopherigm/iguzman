apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "video-downloader.fullname" . }}
  labels:
    {{- include "video-downloader.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "video-downloader.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "video-downloader.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.nodeAffinity.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- toYaml .Values.nodeAffinity.nodeNames | nindent 22 }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          {{- /* ── Plain environment variables ── */}}
          {{- if or .Values.env .Values.envFromSecret }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range .Values.envFromSecret }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- end }}

          {{- /* ── Probes ── */}}
          startupProbe:
            {{- if .Values.probes.startupProbe.httpGet }}
            httpGet:
              path: {{ .Values.probes.startupProbe.httpGet.path }}
              port: {{ .Values.probes.startupProbe.httpGet.port }}
            {{- else if .Values.probes.startupProbe.exec }}
            exec:
              command:
                {{- toYaml .Values.probes.startupProbe.exec.command | nindent 16 }}
            {{- end }}
            initialDelaySeconds: {{ .Values.probes.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.probes.startupProbe.failureThreshold }}

          livenessProbe:
            {{- if .Values.probes.livenessProbe.httpGet }}
            httpGet:
              path: {{ .Values.probes.livenessProbe.httpGet.path }}
              port: {{ .Values.probes.livenessProbe.httpGet.port }}
            {{- else if .Values.probes.livenessProbe.exec }}
            exec:
              command:
                {{- toYaml .Values.probes.livenessProbe.exec.command | nindent 16 }}
            {{- end }}
            initialDelaySeconds: {{ .Values.probes.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.probes.livenessProbe.failureThreshold }}

          {{- /* ── Resources ── */}}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- /* ── Volume mounts ── */}}
          {{- if or .Values.hostPathVolume.enabled .Values.cookiesSecret }}
          volumeMounts:
            {{- if .Values.hostPathVolume.enabled }}
            - name: media-data
              mountPath: {{ .Values.hostPathVolume.mountPath }}
            {{- end }}
            {{- if .Values.cookiesSecret }}
            - name: cookies-file
              mountPath: {{ .Values.cookiesSecret.mountPath }}
              subPath: {{ .Values.cookiesSecret.subPath }}
              readOnly: true
            {{- end }}
          {{- end }}

        {{- /* ── WireGuard VPN sidecar ── */}}
        {{- if .Values.wireguard.enabled }}
        - name: wireguard
          image: "{{ .Values.wireguard.image.repository }}:{{ .Values.wireguard.image.tag }}"
          imagePullPolicy: {{ .Values.wireguard.image.pullPolicy }}

          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE

          startupProbe:
            exec:
              command: ["wg", "show", "wg0"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

          livenessProbe:
            exec:
              command: ["wg", "show", "wg0"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          {{- with .Values.wireguard.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: wireguard-config
              mountPath: /config/wg_confs
              readOnly: true
        {{- end }}

      {{- if or .Values.hostPathVolume.enabled .Values.wireguard.enabled .Values.cookiesSecret }}
      volumes:
        {{- if .Values.hostPathVolume.enabled }}
        - name: media-data
          hostPath:
            path: /{{ .Values.hostPathVolume.volumeMountPath }}/{{ .Release.Namespace }}/media
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.wireguard.enabled }}
        - name: wireguard-config
          secret:
            secretName: {{ .Values.wireguard.secretName }}
            items:
              - key: {{ .Values.wireguard.secretKey }}
                path: wg0.conf
        {{- end }}
        {{- if .Values.cookiesSecret }}
        - name: cookies-file
          secret:
            secretName: {{ .Values.cookiesSecret.secretName }}
            items:
              - key: {{ .Values.cookiesSecret.secretKey }}
                path: {{ .Values.cookiesSecret.subPath }}
        {{- end }}
      {{- end }}
