{{- if .Values.nginxMedia.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "video-downloader.fullname" . }}-media-nginx
  labels:
    {{- include "video-downloader.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen {{ .Values.nginxMedia.port }} quic reuseport;
        listen {{ .Values.nginxMedia.port }} ssl;

        http2 on;
        http3 on;

        ssl_certificate     /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols       TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Block access to sensitive files inside /api/media/
        location = /api/media/netscape-cookies.txt {
            return 403;
        }

        # ── Serve media files at the same path the Next.js API used ──
        location /api/media/ {
            # Allow large video uploads (client-side FFmpeg output)
            client_max_body_size 500m;

            # Write operations (PUT) → forward to the Next.js app server
            # so client-side processed videos are stored on disk.
            limit_except GET HEAD {
                proxy_pass http://{{ include "video-downloader.fullname" . }}:{{ .Values.service.targetPort }};
            }

            alias {{ .Values.hostPathVolume.mountPath }}/;

            # Only the formats video-downloader produces
            types {
                video/mp4                  mp4;
                audio/mp4                  m4a;
                video/webm                 webm;
                audio/mpeg                 mp3;
                audio/wav                  wav;
                audio/ogg                  ogg;
                video/x-matroska           mkv;
                text/plain                 srt;
            }
            default_type application/octet-stream;

            # NOTE: all add_header directives must live in this location block.
            # nginx does not inherit server-level add_header into a location that
            # defines its own add_header directives.
            add_header Cache-Control "public, max-age=3600" always;
            add_header Accept-Ranges bytes always;

            # Required: Next.js sets COEP: require-corp — cross-origin resources must opt in
            add_header Cross-Origin-Resource-Policy "cross-origin" always;

            # Required: allow the Next.js app to fetch media blobs cross-origin
            # (the `download` attribute is ignored for cross-origin URLs, so we
            # fetch as blob and create an object URL instead).
            add_header Access-Control-Allow-Origin "*" always;

            # Advertise HTTP/3 so browsers upgrade to QUIC on the next request
            add_header Alt-Svc 'h3=":{{ .Values.nginxMedia.port }}"; ma=86400' always;

            # Block directory listings
            autoindex off;

            # Optimise large-file delivery
            sendfile           on;
            sendfile_max_chunk 512k;  # yield worker between chunks
            tcp_nopush         on;
            tcp_nodelay        on;
            aio                on;    # async I/O for large video files

            # Cache open file descriptors — avoids a syscall per request
            open_file_cache          max=200 inactive=60s;
            open_file_cache_valid    30s;
            open_file_cache_min_uses 2;
            open_file_cache_errors   on;

            # Buffer tuning for large sequential reads
            output_buffers 2 512k;
        }

        # Health check endpoint for k8s probes
        location = /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Reject everything else
        location / {
            return 404;
        }
    }
{{- end }}
