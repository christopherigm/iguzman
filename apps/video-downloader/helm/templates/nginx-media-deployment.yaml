{{- if .Values.nginxMedia.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "video-downloader.fullname" . }}-media
  labels:
    {{- include "video-downloader.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx-media
spec:
  replicas: {{ .Values.nginxMedia.replicaCount }}
  selector:
    matchLabels:
      {{- include "video-downloader.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nginx-media
  template:
    metadata:
      labels:
        {{- include "video-downloader.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nginx-media
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.nodeAffinity.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- toYaml .Values.nodeAffinity.nodeNames | nindent 22 }}
      {{- end }}

      containers:
        - name: nginx-media
          image: "{{ .Values.nginxMedia.image.repository }}:{{ .Values.nginxMedia.image.tag }}"
          imagePullPolicy: {{ .Values.nginxMedia.image.pullPolicy }}

          ports:
            - name: https-tcp
              containerPort: {{ .Values.nginxMedia.port }}
              protocol: TCP
            - name: https-udp
              containerPort: {{ .Values.nginxMedia.port }}
              protocol: UDP

          startupProbe:
            exec:
              command:
                {{- toYaml .Values.probes.startupProbe.exec.command | nindent 16 }}
            initialDelaySeconds: {{ .Values.probes.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.probes.startupProbe.failureThreshold }}

          livenessProbe:
            exec:
              command:
                {{- toYaml .Values.probes.livenessProbe.exec.command | nindent 16 }}
            initialDelaySeconds: {{ .Values.probes.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.probes.livenessProbe.failureThreshold }}

          readinessProbe:
            tcpSocket:
              port: {{ .Values.nginxMedia.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3

          {{- with .Values.nginxMedia.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            {{- if .Values.hostPathVolume.enabled }}
            - name: media-data
              mountPath: {{ .Values.hostPathVolume.mountPath }}
              readOnly: true
            {{- end }}
            - name: nginx-media-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: tls-certs
              mountPath: /etc/nginx/tls
              readOnly: true

      volumes:
        {{- if .Values.hostPathVolume.enabled }}
        - name: media-data
          hostPath:
            path: {{ .Values.hostPathVolume.volumeMountPath }}/{{ .Release.Namespace }}/media
            type: DirectoryOrCreate
        {{- end }}
        - name: nginx-media-config
          configMap:
            name: {{ include "video-downloader.fullname" . }}-media-nginx
        - name: tls-certs
          secret:
            secretName: {{ include "video-downloader.fullname" . }}-media-tls
{{- end }}
