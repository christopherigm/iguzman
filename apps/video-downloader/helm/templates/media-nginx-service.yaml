{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "video-downloader.mediaNginxName" . }}
  labels:
    {{- include "video-downloader.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.nginx.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "video-downloader.mediaNginxSelectorLabels" . | nindent 4 }}
{{- end }}
