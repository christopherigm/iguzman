# ─────────────────────────────────────────────────────────────
# Video Downloader Application – Helm Values
# ─────────────────────────────────────────────────────────────

# -- Number of old ReplicaSets to keep for rollbacks (default: 2)
revisionHistoryLimit: 2 # how many old ReplicaSets to keep for rollbacks

# -- Number of pod replicas
replicaCount: 3

# ─── Container image ────────────────────────────────────────
image:
  repository: christopherguzman/video-downloader # registry/image (no tag)
  tag: 'latest' # overrides Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: my-registry-secret

# ─── Name overrides ─────────────────────────────────────────
nameOverride: ''
fullnameOverride: ''

# ─── Service ────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80 # port exposed by the Service
  targetPort: 3000 # port the container listens on

# ─── Ingress ────────────────────────────────────────────────
ingress:
  enabled: true
  className: 'nginx' # MicroK8s uses the nginx ingress class
  annotations:
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
  hosts:
    - host: vd2.iguzman.com.mx
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: vd2-tls
      hosts:
        - vd2.iguzman.com.mx

# ─── Environment variables ──────────────────────────────────
# Plain environment variables injected into the container.
env:
  NODE_ENV: 'production'
  NEXT_TELEMETRY_DISABLED: '1'
  # Add your own env vars here, for example:
  # API_URL: "https://api.example.com"
  NEXT_PUBLIC_MEDIA_HOST: 'media.vd2.iguzman.com.mx:8443'  # set when nginxMedia.enabled=true

# Sensitive values – reference existing Kubernetes Secrets.
# envFromSecret:
#   - name: DATABASE_URL
#     secretName: vd2-secrets
#     secretKey: database-url

# ─── Host-path volume (media storage) ───────────────────────
hostPathVolume:
  enabled: true
  volumeMountPath: /shared-master # base path on the host node
  mountPath: /app/media # path inside each container

# ─── Health probes (file-based in shared storage) ───────────
probes:
  # File that both probes check for existence.
  healthFile: /app/media/.healthy

  startupProbe:
    exec:
      command: ['test', '-f', '/app/media/.healthy']
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30 # allow up to ~150 s for first boot

  livenessProbe:
    exec:
      command: ['test', '-f', '/app/media/.healthy']
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3

# ─── Node affinity (schedule on specific nodes) ─────────────
nodeAffinity:
  enabled: false
  # List of node names where the pods should be scheduled.
  nodeNames: []
  # - node-1
  # - node-2
  # - node-3

# ─── nginx-media: standalone HTTP/3 video-serving pod ────────
# Serves GET /api/media/* with HTTP/3 (QUIC) + HTTP/2 from its own pod.
# Exposed via MetalLB LoadBalancer on nginxMedia.port (default 8443).
# DNS for nginxMedia.subdomain must point to the MetalLB IP.
nginxMedia:
  enabled: true
  replicaCount: 4           # HTTP/2 load-balances fine; QUIC sessions may pin to one pod
  image:
    repository: nginx
    tag: '1.27-alpine'
    pullPolicy: IfNotPresent
  port: 8443
  subdomain: 'media.vd2.iguzman.com.mx'  # e.g. media.vd2.iguzman.com.mx
  certIssuer: letsencrypt-prod
  service:
    type: LoadBalancer      # LoadBalancer (MetalLB) or NodePort
    loadBalancerIP: '192.168.0.105'  # optional: pin a MetalLB address pool IP
    nodePorts:
      tcp: ''               # optional: fixed NodePort for TCP (e.g. "30443")
      udp: ''               # optional: fixed NodePort for UDP (e.g. "30443")
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ─── Resources ──────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 900m
    memory: 1Gi
