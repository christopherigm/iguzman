# ─────────────────────────────────────────────────────────────
# Media 2 Go Application - Helm Values
# ─────────────────────────────────────────────────────────────

# -- Number of old ReplicaSets to keep for rollbacks (default: 2)
revisionHistoryLimit: 2 # how many old ReplicaSets to keep for rollbacks

# -- Number of pod replicas
replicaCount: 4

# ─── Container image ────────────────────────────────────────
image:
  repository: christopherguzman/video-downloader # registry/image (no tag)
  tag: 'latest' # overrides Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: my-registry-secret

# ─── Name overrides ─────────────────────────────────────────
nameOverride: ''
fullnameOverride: ''

# ─── Service ────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80 # port exposed by the Service
  targetPort: 3000 # port the container listens on

# ─── Ingress ────────────────────────────────────────────────
ingress:
  enabled: true
  className: 'nginx' # MicroK8s uses the nginx ingress class
  annotations:
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
    nginx.ingress.kubernetes.io/proxy-body-size: '1g'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '600'
    # ── Sticky sessions ──────────────────────────────────────────────
    # Pin each browser to one pod via a cookie. This makes the ?tmp=1
    # upload optimisation reliable: a file staged in a pod's /tmp is then
    # processed (server-processing / diarize) by the *same* pod, so it is
    # found locally without a wasted R2 round-trip. Without affinity the
    # follow-up request could land on a different pod whose /tmp is empty.
    nginx.ingress.kubernetes.io/affinity: 'cookie'
    nginx.ingress.kubernetes.io/affinity-mode: 'persistent'
    nginx.ingress.kubernetes.io/session-cookie-name: 'vd-route'
    nginx.ingress.kubernetes.io/session-cookie-max-age: '86400'
    nginx.ingress.kubernetes.io/session-cookie-path: '/'
  hosts:
    - host: media2go.app
      paths:
        - path: /
          pathType: Prefix
    - host: www.media2go.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: media2go-tls
      hosts:
        - media2go.app
        - www.media2go.app
# ─── Environment variables ──────────────────────────────────
# Plain environment variables injected into the container.
env:
  NODE_ENV: 'production'
  NEXT_TELEMETRY_DISABLED: '1'
  NEXT_PUBLIC_BASE_URL: 'https://media2go.app'
  # Reach the diarization service over the cluster-internal Service DNS
  # instead of the public ingress. The ClusterIP is a private (10.x) address,
  # which is excluded from the WireGuard sidecar's AllowedIPs, so this traffic
  # routes via Calico/eth0 and bypasses the VPN tunnel (the public URL fails to
  # connect through the tunnel). Auth is still enforced via DIARIZATION_API_KEY.
  DIARIZATION_URL: 'http://diarization.diarization.svc.cluster.local'

# Sensitive values - reference existing Kubernetes Secrets.
# Create the secret first:
#   kubectl create secret generic vd2-secrets \
#     --from-literal=groq-api-key=<YOUR_KEY> \
#     -n video-downloader-2
envFromSecret:
  # All sensitive values live in the video-downloader-secrets Kubernetes Secret.
  # Use cli/setup-k8s-secrets/setup-k8s-secrets.sh to create or update it.
  - name: GROQ_API_KEY
    secretName: video-downloader-secrets
    secretKey: GROQ_API_KEY
  - name: DIARIZATION_API_KEY
    secretName: video-downloader-secrets
    secretKey: DIARIZATION_API_KEY
  - name: SCRAPECREATORS_API_KEY
    secretName: video-downloader-secrets
    secretKey: SCRAPECREATORS_API_KEY
  - name: STRIPE_SECRET_KEY
    secretName: video-downloader-secrets
    secretKey: STRIPE_SECRET_KEY
  - name: STRIPE_WEBHOOK_SECRET
    secretName: video-downloader-secrets
    secretKey: STRIPE_WEBHOOK_SECRET
  - name: INTERNAL_SECRET
    secretName: video-downloader-secrets
    secretKey: INTERNAL_SECRET
  - name: R2_ACCOUNT_ID
    secretName: video-downloader-secrets
    secretKey: R2_ACCOUNT_ID
  - name: R2_ACCESS_KEY_ID
    secretName: video-downloader-secrets
    secretKey: R2_ACCESS_KEY_ID
  - name: R2_SECRET_ACCESS_KEY
    secretName: video-downloader-secrets
    secretKey: R2_SECRET_ACCESS_KEY
  - name: R2_BUCKET_NAME
    secretName: video-downloader-secrets
    secretKey: R2_BUCKET_NAME
  - name: R2_PUBLIC_URL
    secretName: video-downloader-secrets
    secretKey: R2_PUBLIC_URL
  - name: MONGO_URI
    secretName: video-downloader-secrets
    secretKey: MONGO_URI
  - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secretName: video-downloader-secrets
    secretKey: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
  - name: LOG_LEVEL
    secretName: video-downloader-secrets
    secretKey: LOG_LEVEL

# ─── Host-path volume (media storage) ───────────────────────
# Disabled: media is now stored in R2 Object Storage.
hostPathVolume:
  enabled: false
  volumeMountPath: /shared-master
  mountPath: /app/media

# ─── yt-dlp cookies file ────────────────────────────────────
# Cookies content is stored as the COOKIES key in video-downloader-secrets
# and mounted as a file at /app/netscape-cookies.txt.
# Use cli/setup-k8s-secrets/setup-k8s-secrets.sh to set it.
cookiesSecret:
  secretName: "video-downloader-secrets"
  secretKey: COOKIES
  mountPath: /app/netscape-cookies.txt
  subPath: netscape-cookies.txt

# ─── Health probes (HTTP) ────────────────────────────────────
probes:
  startupProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3

# ─── Node affinity (schedule on specific nodes) ─────────────
nodeAffinity:
  enabled: true
  # List of node names where the pods should be scheduled.
  nodeNames:
    - node6
    - node4
    # - node1

# ─── WireGuard VPN sidecar ───────────────────────────────────
# Routes all public-IP egress through a Surfshark WireGuard server
# so yt-dlp calls leave the cluster behind a VPN IP.
#
# All containers in a pod share a network namespace: wg-quick's
# routes and iptables rules affect every container. Three rules
# must be followed in wg0.conf or the pod will break:
#
# ① No "DNS = ..." in [Interface]
#   wg-quick's DNS management redirects port-53 traffic through the
#   VPN for all containers. Kubernetes CoreDNS already handles DNS
#   via a 10.x.x.x ClusterIP that is excluded from AllowedIPs and
#   always routes via eth0 - no VPN involvement needed.
#
# ② No "AllowedIPs = 0.0.0.0/0" in [Peer]
#   0.0.0.0/0 triggers wg-quick's policy-routing mode (kernel ip rule
#   entries) which captures ALL traffic - including internal cluster
#   traffic - before the tunnel is established, breaking the pod.
#   Use the public-only CIDR list below instead. It is the complement
#   of 10/8 + 169.254/16 + 172.16/12 + 192.168/16, so private ranges
#   route via eth0 (Calico) automatically with no PostUp tricks.
#
# ③ Add PostUp/PreDown endpoint host routes in [Interface]
#   The Surfshark server IP (e.g. 212.102.44.115) falls inside the
#   208.0.0.0/4 AllowedIPs range. Without a /32 host route via eth0,
#   wg-quick routes its own handshake UDP packets back through wg0
#   (a loop), the tunnel never connects (0 B received), and all
#   public-IP traffic silently drops. The PostUp line reads the
#   resolved endpoint IP at startup and adds a /32 that beats the /4.
#
# Minimal wg0.conf (source: apps/video-downloader/us-den.conf):
#
#   [Interface]
#   Address    = 10.14.0.2/16
#   PrivateKey = <your-private-key>
#   # ① Prevent the VPN endpoint's own UDP traffic from looping through wg0
#   PostUp  = ip route add $(wg show wg0 endpoints | awk '{print $2}' | sed 's/:[0-9]*$//')/32 via 169.254.1.1
#   PreDown = ip route del $(wg show wg0 endpoints | awk '{print $2}' | sed 's/:[0-9]*$//')/32 via 169.254.1.1 2>/dev/null || true
#   # ② Bypass VPN for Groq API - Surfshark IPs are blocked by Groq
#   PostUp  = for IP in $(nslookup api.groq.com 2>/dev/null | awk '/^Address: /{print $2}' || getent hosts api.groq.com 2>/dev/null | awk '{print $1}'); do ip route add ${IP}/32 via 169.254.1.1 dev eth0 2>/dev/null || true; done
#   PreDown = for IP in $(nslookup api.groq.com 2>/dev/null | awk '/^Address: /{print $2}' || getent hosts api.groq.com 2>/dev/null | awk '{print $1}'); do ip route del ${IP}/32 via 169.254.1.1 dev eth0 2>/dev/null || true; done
#
#   [Peer]
#   PublicKey  = <server-public-key>
#   AllowedIPs = 0.0.0.0/5, 8.0.0.0/7, 11.0.0.0/8, 12.0.0.0/6, 16.0.0.0/4, 32.0.0.0/3, 64.0.0.0/2, 128.0.0.0/3, 160.0.0.0/5, 168.0.0.0/8, 169.0.0.0/9, 169.128.0.0/10, 169.192.0.0/11, 169.224.0.0/12, 169.240.0.0/13, 169.248.0.0/14, 169.252.0.0/15, 169.255.0.0/16, 170.0.0.0/15, 172.0.0.0/12, 172.32.0.0/11, 172.64.0.0/10, 172.128.0.0/9, 173.0.0.0/8, 174.0.0.0/7, 176.0.0.0/4, 192.0.0.0/9, 192.128.0.0/11, 192.160.0.0/13, 192.169.0.0/16, 192.170.0.0/15, 192.172.0.0/14, 192.176.0.0/12, 192.192.0.0/10, 193.0.0.0/8, 194.0.0.0/7, 196.0.0.0/6, 200.0.0.0/5, 208.0.0.0/4
#   Endpoint   = us-den.prod.surfshark.com:51820
#
# Initial setup:
#   kubectl create secret generic video-downloader-wireguard \
#     --from-file=wg0.conf=./apps/video-downloader/us-den.conf \
#     -n video-downloader-2
#
# Updating the config:
#   kubectl create secret generic video-downloader-wireguard \
#     --from-file=wg0.conf=./apps/video-downloader/us-den.conf \
#     -n video-downloader-2 --dry-run=client -o yaml | kubectl apply -f -
#   kubectl rollout restart deployment/video-downloader -n video-downloader-2
#
# Verifying the tunnel (both checks must pass):
#   kubectl exec -n video-downloader-2 deploy/video-downloader \
#     -c wireguard -- wg show wg0
#   # → "latest handshake" line present, "transfer: X received" > 0
#
#   kubectl exec -n video-downloader-2 deploy/video-downloader \
#     -c video-downloader -- curl -s --max-time 15 https://ipinfo.io/ip
#   # → US Surfshark IP, not the node's real IP
#
# Set wireguard.enabled: true to activate.
wireguard:
  enabled: true
  image:
    repository: lscr.io/linuxserver/wireguard
    tag: latest
    pullPolicy: IfNotPresent
  # Name of the Kubernetes Secret that holds the WireGuard config (WG_CONFIG key).
  secretName: "video-downloader-secrets"
  secretKey: WG_CONFIG
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 800m
      memory: 512Mi

# ─── Resources ──────────────────────────────────────────────
# Comment out to allow pods to use all available node resources.
# resources:
#   requests:
#     cpu: 100m
#     memory: 128Mi
#   limits:
#     cpu: 900m
#     memory: 1Gi
