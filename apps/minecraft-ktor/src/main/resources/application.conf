ktor {
    application {
        modules = [ com.iguzman.minecraft.ApplicationKt.module ]
    }
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
    }
}

compile {
    templateDir = "/opt/mc-template"
    templateDir = ${?TEMPLATE_DIR}
    gradleHome  = "/opt/gradle-home"
    gradleHome  = ${?GRADLE_USER_HOME}
    workspaceDir = "/tmp/mc-builds"
    workspaceDir = ${?BUILD_WORKSPACE_DIR}
    timeoutSeconds = 600
}
