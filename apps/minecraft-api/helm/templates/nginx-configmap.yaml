{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "minecraft-api.fullname" . }}-nginx
  labels:
    {{- include "minecraft-api.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen {{ .Values.nginx.port }};
        server_name _;

        location /media/ {
            if ($request_method !~ ^(GET|HEAD)$) {
                return 405;
            }
            alias {{ .Values.sharedStorage.mountPath }}/;
            expires 1h;
            add_header Cache-Control "public";
            sendfile on;
            tcp_nopush on;
        }

        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 404;
        }
    }
{{- end }}
