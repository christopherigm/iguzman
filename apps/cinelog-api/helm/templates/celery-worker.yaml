{{- if .Values.celery.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cinelog-api.fullname" . }}-worker
  labels:
    {{- include "cinelog-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.celery.replicaCount }}
  selector:
    matchLabels:
      {{- include "cinelog-api.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "cinelog-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.nodeAffinity.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- toYaml .Values.nodeAffinity.nodeNames | nindent 22 }}
      {{- end }}

      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - cinelog_api
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.celery.concurrency }}

          {{- if .Values.envFrom }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          {{- end }}
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

          # `celery inspect ping` is a broadcast round-trip that can be slow to
          # answer while the (few) prefork children are busy on long scraper/LLM
          # tasks. Keep the probe but make it tolerant so a healthy-but-busy
          # worker is not killed mid-task (which would strand ScanQueue entries).
          # acks_late + reject_on_worker_lost (see settings.py) make any genuine
          # restart safe by requeuing the in-flight task rather than losing it.
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - cinelog_api
                - inspect
                - ping
                - -d
                - celery@$(HOSTNAME)
                - --timeout
                - "30"
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
            timeoutSeconds: 35

          {{- with .Values.celery.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
