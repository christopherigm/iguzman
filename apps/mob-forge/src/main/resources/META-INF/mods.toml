# NeoForge 1.20.2 uses META-INF/mods.toml (the neoforge.mods.toml rename comes later, in 1.20.5+).
# Placeholder tokens (dollar-brace) are substituted at build time by Gradle from gradle.properties.
modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

# ── Dependencies ─────────────────────────────────────────────────────────────
# NeoForge 20.2 (1.20.2) uses the Forge-era boolean `mandatory=true` field.
# The newer `type="required"` dependency syntax only arrives in 20.3+ (1.20.4)
# and makes 20.2 reject the mod with "Missing required field mandatory" (R7).
[[dependencies.${mod_id}]]
    modId="neoforge"
    mandatory=true
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="geckolib"
    mandatory=true
    versionRange="${geckolib_version_range}"
    ordering="AFTER"
    side="BOTH"
