# ─────────────────────────────────────────────────────────────
# Scraper Microservice - Helm Values
# ─────────────────────────────────────────────────────────────

# -- Number of old ReplicaSets to keep for rollbacks (default: 2)
revisionHistoryLimit: 2

# -- Number of pod replicas (keep at 1 - shared Playwright browser instance)
replicaCount: 2

# ─── Container image ────────────────────────────────────────
image:
  # Overridden at deploy time from DOCKER_REGISTRY (.env) -> ${DOCKER_REGISTRY}/scraper
  repository: scraper
  tag: 'latest' # overrides Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: my-registry-secret

# ─── Name overrides ─────────────────────────────────────────
nameOverride: ''
fullnameOverride: ''

# ─── Service ────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80       # port exposed by the Service
  targetPort: 4000 # port the container listens on

# ─── Ingress ────────────────────────────────────────────────
ingress:
  enabled: true
  className: 'nginx'
  annotations:
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '120'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '120'
  hosts:
    - host: scraper.iguzman.com.mx
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: scraper-tls
      hosts:
        - scraper.iguzman.com.mx

# ─── Environment variables ──────────────────────────────────
# Plain (non-sensitive) environment variables.
env:
  NODE_ENV: 'production'
  PORT: '4000'
  LOG_LEVEL: 'info'
  COOKIES_PATH: '/secrets/cookies.txt'

# Load all keys from the Kubernetes secret as environment variables.
# Run setup-k8s-secrets first to create the secret.
# Secret keys expected: SCRAPER_API_KEY, BRAVE_API_KEY, COOKIES, WG_CONFIG, PROXY_HOST, PROXY_PORT, PROXY_USER, PROXY_PASS
envFrom:
  - secretRef:
      name: scraper-secrets

# ─── Health probes (HTTP against /health endpoint) ──────────
probes:
  startupProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 5
    periodSeconds: 5
    # Computed in deployment.yaml from browserCache.enabled:
    #   true  → 36 attempts (3 min) - covers ~170 MB Chromium download on first boot
    #   false → uses this value (12 = ~60 s) - browser is baked into the image
    failureThreshold: 12

  livenessProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3

# ─── Node affinity (schedule on specific nodes) ─────────────
# nodeAffinity:
#   enabled: false
#   nodeNames: []
  # - node-1
nodeAffinity:
  enabled: true
  nodeNames:
    - node6

# ─── WireGuard VPN sidecar ───────────────────────────────────
# Routes all public-IP egress through a Surfshark WireGuard server
# so Playwright/scraper calls leave the cluster behind a VPN IP.
#
# See apps/video-downloader/helm/values.yaml → wireguard section
# for the full wg0.conf rules (AllowedIPs public-only list, PostUp
# endpoint host route, no DNS line).
#
# Initial setup (create the secret with your wg0.conf):
#   kubectl create secret generic scraper-secrets \
#     --from-literal=WG_CONFIG="$(cat ./apps/scraper/wg0.conf)" \
#     -n scraper
#   # or append to an existing scraper-secrets secret
#
# Verifying the tunnel:
#   kubectl exec -n scraper deploy/scraper -c wireguard -- wg show wg0
#   kubectl exec -n scraper deploy/scraper -c scraper -- curl -s --max-time 15 https://ipinfo.io/ip
#
# Set wireguard.enabled: true to activate.
wireguard:
  enabled: true
  image:
    repository: lscr.io/linuxserver/wireguard
    tag: latest
    pullPolicy: IfNotPresent
  # Name of the Kubernetes Secret that holds the WireGuard config (WG_CONFIG key).
  secretName: "scraper-secrets"
  secretKey: WG_CONFIG
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 800m
      memory: 512Mi

# ─── Cookies file (Netscape format, mounted from secret) ────
# The setup-k8s-secrets script reads the local cookies file and stores its
# content as the COOKIES key in scraper-secrets. The Helm chart then mounts
# that secret key as a file at cookies.mountPath, which matches COOKIES_PATH
# in the env section above.
cookies:
  enabled: true
  secretName: "scraper-secrets"
  secretKey: COOKIES
  mountPath: /secrets/cookies.txt

# ─── Browser cache (PersistentVolume) ───────────────────────
# Stores the Playwright Chromium binary (~170 MB) on a PVC so the download
# only happens on first boot rather than every redeploy.
# Requires a StorageClass with ReadWriteOnce support (cluster default if empty).
browserCache:
  enabled: true
  size: 1Gi
  storageClass: ''

# ─── Resources ──────────────────────────────────────────────
# Playwright + Chromium is memory-hungry; 1 Gi is a safe floor.
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi
