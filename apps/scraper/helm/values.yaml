# ─────────────────────────────────────────────────────────────
# Scraper Microservice - Helm Values
# ─────────────────────────────────────────────────────────────

# -- Number of old ReplicaSets to keep for rollbacks (default: 2)
revisionHistoryLimit: 2

# -- Number of pod replicas (keep at 1 - shared Playwright browser instance)
replicaCount: 1

# ─── Container image ────────────────────────────────────────
image:
  repository: christopherguzman/scraper # registry/image (no tag)
  tag: 'latest' # overrides Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: my-registry-secret

# ─── Name overrides ─────────────────────────────────────────
nameOverride: ''
fullnameOverride: ''

# ─── Service ────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80       # port exposed by the Service
  targetPort: 4000 # port the container listens on

# ─── Ingress ────────────────────────────────────────────────
ingress:
  enabled: true
  className: 'nginx'
  annotations:
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
  hosts:
    - host: scraper.iguzman.com.mx
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: scraper-tls
      hosts:
        - scraper.iguzman.com.mx

# ─── Environment variables ──────────────────────────────────
# Plain (non-sensitive) environment variables.
env:
  NODE_ENV: 'production'

# Load all keys from the Kubernetes secret as environment variables.
# Run setup-k8s-secrets first to create the secret.
envFrom:
  - secretRef:
      name: scraper-secrets

# ─── Health probes (HTTP against /health endpoint) ──────────
probes:
  startupProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 12 # allow up to ~60 s for Chromium first launch

  livenessProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3

# ─── Node affinity (schedule on specific nodes) ─────────────
# nodeAffinity:
#   enabled: false
#   nodeNames: []
  # - node-1
nodeAffinity:
  enabled: true
  nodeNames:
    - node6

# ─── WireGuard VPN sidecar ───────────────────────────────────
# Routes all public-IP egress through a Surfshark WireGuard server
# so Playwright/scraper calls leave the cluster behind a VPN IP.
#
# See apps/video-downloader/helm/values.yaml → wireguard section
# for the full wg0.conf rules (AllowedIPs public-only list, PostUp
# endpoint host route, no DNS line).
#
# Initial setup (create the secret with your wg0.conf):
#   kubectl create secret generic scraper-secrets \
#     --from-literal=WG_CONFIG="$(cat ./apps/scraper/wg0.conf)" \
#     -n scraper
#   # or append to an existing scraper-secrets secret
#
# Verifying the tunnel:
#   kubectl exec -n scraper deploy/scraper -c wireguard -- wg show wg0
#   kubectl exec -n scraper deploy/scraper -c scraper -- curl -s --max-time 15 https://ipinfo.io/ip
#
# Set wireguard.enabled: true to activate.
wireguard:
  enabled: true
  image:
    repository: lscr.io/linuxserver/wireguard
    tag: latest
    pullPolicy: IfNotPresent
  # Name of the Kubernetes Secret that holds the WireGuard config (WG_CONFIG key).
  secretName: "scraper-secrets"
  secretKey: WG_CONFIG
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 800m
      memory: 512Mi

# ─── Resources ──────────────────────────────────────────────
# Playwright + Chromium is memory-hungry; 1 Gi is a safe floor.
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi
