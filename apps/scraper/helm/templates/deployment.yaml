apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scraper.fullname" . }}
  labels:
    {{- include "scraper.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "scraper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scraper.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.nodeAffinity.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- toYaml .Values.nodeAffinity.nodeNames | nindent 22 }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          {{- /* ── Environment variables ── */}}
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.envFrom }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          {{- end }}

          {{- /* ── Probes (HTTP /health endpoint) ── */}}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startupProbe.httpGet.path }}
              port: {{ .Values.probes.startupProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startupProbe.periodSeconds }}
            failureThreshold: {{ if .Values.browserCache.enabled }}36{{ else }}{{ .Values.probes.startupProbe.failureThreshold }}{{ end }}

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessProbe.httpGet.path }}
              port: {{ .Values.probes.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.probes.livenessProbe.failureThreshold }}

          {{- /* ── Resources ── */}}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- /* ── Volume mounts ── */}}
          {{- if or .Values.cookies.enabled .Values.browserCache.enabled }}
          volumeMounts:
            {{- if .Values.cookies.enabled }}
            - name: cookies
              mountPath: {{ .Values.cookies.mountPath }}
              subPath: cookies.txt
              readOnly: true
            {{- end }}
            {{- if .Values.browserCache.enabled }}
            - name: browser-cache
              mountPath: /browsers
            {{- end }}
          {{- end }}

        {{- /* ── WireGuard VPN sidecar ── */}}
        {{- if .Values.wireguard.enabled }}
        - name: wireguard
          image: "{{ .Values.wireguard.image.repository }}:{{ .Values.wireguard.image.tag }}"
          imagePullPolicy: {{ .Values.wireguard.image.pullPolicy }}

          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE

          startupProbe:
            exec:
              command: ["wg", "show", "wg0"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

          livenessProbe:
            exec:
              command: ["wg", "show", "wg0"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          {{- with .Values.wireguard.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: wireguard-config
              mountPath: /config/wg_confs
              readOnly: true
        {{- end }}

      {{- if or .Values.wireguard.enabled .Values.cookies.enabled .Values.browserCache.enabled }}
      volumes:
        {{- if .Values.wireguard.enabled }}
        - name: wireguard-config
          secret:
            secretName: {{ .Values.wireguard.secretName }}
            items:
              - key: {{ .Values.wireguard.secretKey }}
                path: wg0.conf
        {{- end }}
        {{- if .Values.cookies.enabled }}
        - name: cookies
          secret:
            secretName: {{ .Values.cookies.secretName }}
            items:
              - key: {{ .Values.cookies.secretKey }}
                path: cookies.txt
        {{- end }}
        {{- if .Values.browserCache.enabled }}
        - name: browser-cache
          persistentVolumeClaim:
            claimName: {{ include "scraper.fullname" . }}-browser-cache
        {{- end }}
      {{- end }}
