# ─────────────────────────────────────────────────────────────
# Edge Folio Api Application – Helm Values
# ─────────────────────────────────────────────────────────────

revisionHistoryLimit: 2
replicaCount: 1

# ─── Container image ────────────────────────────────────────
image:
  repository: christopherguzman/edge-folio-api
  tag: 'latest'
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ─── Name overrides ─────────────────────────────────────────
nameOverride: ''
fullnameOverride: ''

# ─── Service ────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# ─── Ingress ────────────────────────────────────────────────
ingress:
  enabled: true
  className: 'nginx'
  annotations:
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
  hosts:
    - host: api-edge-folio.iguzman.com.mx
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: edge-folio-api-tls
      hosts:
        - api-edge-folio.iguzman.com.mx

# ─── Environment variables ──────────────────────────────────
# Non-secret vars not present in env.example / the k8s secret.
env:
  EMAIL_VERIFICATION_TOKEN_EXPIRY_HOURS: '24'
  GUNICORN_WORKERS: '3'

# Load all env.example variables from the pre-existing secret.
# Keys in the secret match env.example names exactly.
envFrom:
  - secretRef:
      name: edge-folio-api-secrets

# ─── Shared storage (media files via hostPath) ───────────────
sharedStorage:
  enabled: true
  hostPath: '/shared-master'
  mountPath: /app/media

# ─── Nginx sidecar (serves /media/ files) ───────────────────
nginx:
  enabled: true
  image: nginx:alpine
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─── Health probes ──────────────────────────────────────────
probes:
  startupProbe:
    httpGet:
      path: /admin/
      port: 8000
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 30

  livenessProbe:
    httpGet:
      path: /admin/
      port: 8000
    periodSeconds: 10
    failureThreshold: 3

# ─── Node affinity ──────────────────────────────────────────
nodeAffinity:
  enabled: false
  nodeNames: []

# ─── Resources ──────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
